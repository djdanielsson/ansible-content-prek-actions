---
- id: ansible-lint
  name: Ansible Lint
  description: >-
    Run ansible-lint to check playbooks for practices and behavior
    that could potentially be improved.
    Supports --galaxy-server-url, --galaxy-server-auth-url, and
    --galaxy-server-token-env for private Galaxy server authentication.
  entry: run-ansible-lint
  language: python
  pass_filenames: false
  always_run: true
  additional_dependencies: ['ansible-dev-tools==26.4.1']

- id: changelog
  name: Validate Changelog
  description: >-
    Validate that changelog fragments exist and are properly formatted.
    Runs antsibull-changelog lint for thorough validation.
    Auto-detects the base ref from the remote default branch.
    Override with args: [--ref, develop].
    Supports --galaxy-server-url, --galaxy-server-auth-url, and
    --galaxy-server-token-env for private Galaxy server authentication.
  entry: validate-changelog
  language: python
  pass_filenames: false
  always_run: true
  additional_dependencies: ['ansible-dev-tools==26.4.1']

- id: galaxy-importer
  name: Ansible Galaxy Importer
  description: >-
    Build the collection tarball and run galaxy-importer to validate it.
    Supports --galaxy-server-url, --galaxy-server-auth-url, and
    --galaxy-server-token-env for private Galaxy server authentication.
  entry: run-galaxy-importer
  language: python
  pass_filenames: false
  always_run: true
  additional_dependencies: ['galaxy-importer==0.4.38']

- id: sanity
  name: Ansible Sanity Tests
  description: >-
    WARNING: SLOW. Run tox-ansible sanity tests. Uses tox-ansible.ini
    if present, otherwise creates a sensible default.
    Supports --galaxy-server-url, --galaxy-server-auth-url, and
    --galaxy-server-token-env for private Galaxy server authentication.
  entry: run-tox-sanity
  language: python
  pass_filenames: false
  always_run: true
  stages: [manual]
  additional_dependencies: ['ansible-dev-tools==26.4.1']

- id: unit
  name: Ansible Unit Tests
  description: >-
    WARNING: SLOW. Run tox-ansible unit tests. Uses tox-ansible.ini
    if present, otherwise creates a sensible default.
    Supports --galaxy-server-url, --galaxy-server-auth-url, and
    --galaxy-server-token-env for private Galaxy server authentication.
  entry: run-tox-unit
  language: python
  pass_filenames: false
  always_run: true
  stages: [manual]
  additional_dependencies: ['ansible-dev-tools==26.4.1']

- id: integration
  name: Ansible Integration Tests
  description: >-
    WARNING: SLOW. Run tox-ansible integration tests. Uses tox-ansible.ini
    if present, otherwise creates a sensible default.
    Supports --galaxy-server-url, --galaxy-server-auth-url, and
    --galaxy-server-token-env for private Galaxy server authentication.
  entry: run-tox-integration
  language: python
  pass_filenames: false
  always_run: true
  stages: [manual]
  additional_dependencies: ['ansible-dev-tools==26.4.1']

- id: ee-build
  name: Build Execution Environment
  description: >-
    WARNING: SLOW. Build an Ansible execution environment image using
    ansible-builder. Requires podman or docker.
    Supports --galaxy-server-url, --galaxy-server-auth-url, and
    --galaxy-server-token-env for private Galaxy server authentication.
  entry: ansible-ee-build
  language: python
  pass_filenames: false
  always_run: true
  stages: [manual]
  additional_dependencies: ['ansible-dev-tools==26.4.1']
